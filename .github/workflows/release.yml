name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in module.json
        run: |
          jq '.version = "${{ steps.version.outputs.version }}" |
              .download = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/daggerheart-foundry-importer.zip"' \
            module.json > module.tmp && mv module.tmp module.json

      - name: Create zip
        run: zip -r daggerheart-foundry-importer.zip module.json scripts/ styles/ lang/ assets/

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./module.json,./daggerheart-foundry-importer.zip"
          generateReleaseNotes: true
